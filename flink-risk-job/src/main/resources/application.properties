# ============================================================
# Flink 规则引擎 - Job 模块配置
# 说明：此文件由 Flink Job 启动时通过 ParameterTool 加载
# ============================================================

# ── Flink 配置 ──────────────────────────────────────────
flink.parallelism=4
flink.checkpoint.interval=60000
flink.checkpoint.mode=EXACTLY_ONCE
flink.state.backend=rocksdb

# ── Kafka 配置（Docker 服务名）─────────────────────────
kafka.bootstrap.servers=kafka:29092
kafka.group.id=risk-control-group
kafka.auto.offset.reset=latest
kafka.topic.login=login-events
kafka.topic.order=order-events
kafka.topic.activity=activity-events

# ── Redis 配置（Docker 服务名）─────────────────────────
redis.host=redis
redis.port=6379
redis.password=redis123
redis.database=0
redis.timeout=2000
redis.key.ttl=3600

# ── 规则配置 ────────────────────────────────────────────
rule.cache.size=1000
rule.cache.ttl=3600
rule.hot.reload.enable=true
rule.hot.reload.interval=60000

# ── 时间窗口配置（毫秒）────────────────────────────────
window.login.size=300000
window.login.slide=60000
window.order.size=3600000
window.order.slide=600000
window.activity.size=86400000
window.activity.slide=3600000

# ── 环境标识 ────────────────────────────────────────────
app.env=docker
app.name=flink-risk-control
app.version=2.0.1
