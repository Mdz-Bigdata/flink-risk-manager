# ============================================================
# Flink Risk Control Job - Log4j2 配置
# 支持控制台 + 文件双输出，按天滚动
# ============================================================

# 根日志级别
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = Console
rootLogger.appenderRef.rolling.ref = RollingFile

# 控制台输出（开发/本地调试）
appender.console.type = Console
appender.console.name = Console
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# 文件输出（按天滚动，生产环境）
appender.rolling.type = RollingFile
appender.rolling.name = RollingFile
appender.rolling.fileName = ./logs/flink-risk-job.log
appender.rolling.filePattern = logs/flink-risk-job-%d{yyyy-MM-dd}.log.gz
appender.rolling.layout.type = PatternLayout
appender.rolling.layout.pattern = %d{yyyy-MM-dd HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n
appender.rolling.policies.type = Policies
appender.rolling.policies.time.type = TimeBasedTriggeringPolicy
appender.rolling.policies.time.interval = 1
appender.rolling.policies.time.modulate = true
appender.rolling.policies.size.type = SizeBasedTriggeringPolicy
appender.rolling.policies.size.size = 100MB
appender.rolling.strategy.type = DefaultRolloverStrategy
appender.rolling.strategy.max = 30

# 业务日志（DEBUG 级别）
logger.business.name = com.risk
logger.business.level = DEBUG
logger.business.additivity = false
logger.business.appenderRef.console.ref = Console
logger.business.appenderRef.rolling.ref = RollingFile

# Kafka 客户端降低日志级别
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

# Flink 内部降低日志级别
logger.flink.name = org.apache.flink
logger.flink.level = WARN
