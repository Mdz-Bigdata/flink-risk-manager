# Flink Configuration
flink.parallelism=4
flink.checkpoint.interval=60000
flink.checkpoint.mode=EXACTLY_ONCE
flink.state.backend=rocksdb

# Kafka Configuration
kafka.bootstrap.servers=localhost:9092
kafka.group.id=risk-control-group
kafka.auto.offset.reset=latest
kafka.topic.login=login-events
kafka.topic.order=order-events
kafka.topic.activity=activity-events

# Redis Configuration
redis.host=localhost
redis.port=6379
redis.database=0
redis.timeout=2000
redis.pool.max.active=10
redis.pool.max.idle=5
redis.pool.min.idle=2
redis.key.ttl=3600

# Rule Configuration
rule.cache.size=1000
rule.cache.ttl=3600
rule.config.path=classpath:rules
rule.hot.reload.enable=true
rule.hot.reload.interval=60000

# Window Configuration
window.login.size=300000
window.login.slide=60000
window.order.size=3600000
window.order.slide=600000
window.activity.size=86400000
window.activity.slide=3600000

# CEP Configuration
cep.pattern.timeout=300000
cep.pattern.consecutive=true

# Alert Configuration
alert.enable=true
alert.high.risk.threshold=80
alert.medium.risk.threshold=50
alert.sink.type=log

# Application Configuration
app.env=dev
app.name=flink-risk-control-system
app.version=1.0.0